name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...
          go test -race ./...
          sh -n install.sh

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          mkdir -p dist
          for arch in amd64 arm64; do
            package_dir="dist/package-$arch"
            mkdir -p "$package_dir"
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=$VERSION" \
              -o "$package_dir/bookshelf" \
              ./cmd/bookshelf
            tar -C "$package_dir" -czf "dist/bookshelf_linux_${arch}.tar.gz" \
              bookshelf
            rm -rf "$package_dir"
          done
          (
            cd dist
            sha256sum bookshelf_linux_*.tar.gz > checksums.txt
            sha256sum -c checksums.txt
          )

      - name: Smoke-test release and installer
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -eu
          smoke_dir=$(mktemp -d)
          trap 'rm -rf "$smoke_dir"' EXIT
          tar -xzf dist/bookshelf_linux_amd64.tar.gz -C "$smoke_dir"
          "$smoke_dir/bookshelf" version | grep -F "$VERSION"

          mkdir -p "$smoke_dir/home"
          export HOME="$smoke_dir/home"
          export XDG_CONFIG_HOME="$HOME/.config"
          cp install.sh "$smoke_dir/install-release.sh"
          BOOKSHELF_INSTALL_DIR="$smoke_dir/install" \
          BOOKSHELF_BIN_DIR="$smoke_dir/bin" \
          BOOKSHELF_RELEASE_BASE_URL="file://$GITHUB_WORKSPACE/dist" \
            sh "$smoke_dir/install-release.sh"
          "$smoke_dir/bin/bookshelf" version | grep -F "$VERSION"
          test -f "$smoke_dir/install/data/books.json"
          test -f "$smoke_dir/install/public/index.html"
          "$smoke_dir/bin/bookshelf" status --json \
            | grep -F "\"dataDirectory\": \"$smoke_dir/install/data\""

          BOOKSHELF_BIN_PATH="$smoke_dir/bin/bookshelf" \
            "$smoke_dir/bin/bookshelf" uninstall --yes
          test -f "$smoke_dir/install/data/books.json"
          test -f "$XDG_CONFIG_HOME/bookshelf/root"
          test ! -e "$smoke_dir/bin/bookshelf"

          BOOKSHELF_BIN_DIR="$smoke_dir/bin" \
          BOOKSHELF_RELEASE_BASE_URL="file://$GITHUB_WORKSPACE/dist" \
            sh "$smoke_dir/install-release.sh"
          test -f "$smoke_dir/install/data/books.json"
          "$smoke_dir/bin/bookshelf" status --json \
            | grep -F "\"dataDirectory\": \"$smoke_dir/install/data\""

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
          fi
